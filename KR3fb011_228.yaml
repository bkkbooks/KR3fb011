body:
  text: 刻二十分乘之以定限行度而一得既內分推食既生光分以食甚分內減既內分餘得食既分以食甚分內加既內分得生光分各以發斂收之得時刻但凡月食次日日未出者皆退一日算之推更點法以晨分倍之五歸之得更法將更法五歸之為點法推初虧食既食甚生光復圓更點如在昏分以上減去昏分餘以更法除之不及更法以點法除之如在晨分以下加晨分以更點法除之不及更點法為初更初點得一除呼二更二除呼三更三除呼四更四除呼五更點法除亦如之推月食帶食分秒以日出分減食甚餘得帶食差以月食分乘之以定用分而一得帶食分以減月食分秒餘得不見食分如月食在昏刻者以日入分減食甚餘得帶食差以月食分秒乘之以定用分而一得帶食分以減月食分秒餘得見食分秒
