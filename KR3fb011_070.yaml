body:
  text: 取平立定三差法以四因三差六十一分七三八七八八三得二刻四六九五五一五三二減一段二差餘九刻五四九三三四七一九折半得四刻七七四六六七三五九五寄位以六歸三差六十一分七三八七八八三得一十分二八九七九八五加寄位內得四刻八七七五六五三五再加一段下二差一十二刻一八八八六二五一得一十六刻八九六四五一六一又加一段積差五十九刻一八二三二四一四共得七十六刻七八七七一五為實以一段下積日一十五日六十二刻為法除實得四刻八十七分六秒為泛定差就為積度定差以三差六十一分七三八七八八三倍得一刻二三四七七五七六六減二差一十二刻一八八八六二五一餘一十刻七八四一一四八五為實以一段積日一十五日六十二刻除二次先除一次得六十九分四三七四四四再除一次得四分四
