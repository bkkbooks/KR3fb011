body:
  text: 表立正南圭臥直北表首𥪡兩小柱上架橫梁正撰東西取日臨午中片頃橫梁之景下徹圭面為的但晷高景淡罔象非真別為景符以取實數其制從橫數寸方閵為趺平立圭心上梁設為機軸令可轉側中穿縫罅僅通一線容受日光其勢斜倚夏高冬下南北往來遷就日晷得其中正隱然見橫梁攝入縫罅之中細若毛髮不爽絲毫測驗既確乃以漏水計之得夜漏之半以配日午之中夜候月星行到天心隨而測之則陰陽經緯三光之精皆得真數取冬至得盈取夏至得縮是太陽之進退也取月之最低得遲最高得疾是太陰之升降也五星出黃道最遠者曰盈入黃道最裏者曰縮取交食之虧復折取其中加減盈縮遲疾之刻定為經望經翔取月食分秒定為交應以冬至為氣應以月遲為轉應以經朔較氣應為閏應以氣應得歲周倍三百六十五日四分度之一得七百三十日五十刻以較歲周得周天度分以閏餘得月策以轉應得轉終以交應得交終以月策而一周天度分得數加日行一度得月平行度分
