body:
  text: 表立正南圭臥直北表首𥪡兩小柱上架横梁正撰東西取日臨午中片頃横梁之景下徹圭面爲的但晷高景淡罔象非眞別爲景符以取實數其制從横數寸方閵爲趺平立圭心上梁設爲機軸令可轉側中穿縫罅僅通一綫容受日光其勢斜倚夏高冬下南北往來遷就日晷得其中正隱然見横梁攝入縫罅之中細若毛髮不爽絲毫測驗旣確乃以漏水計之得夜漏之半以配日午之中夜候月星行到天心隨而測之則陰陽經緯三光之精皆得眞數取冬至得盈取夏至得縮是太陽之進退也取月之最低得遲最高得疾是太陰之升降也五星出黃道最遠者曰盈入黃道最裏者曰縮取交食之虧復折取其中加減盈縮遲疾之刻定爲經望經翔取月食分秒定爲交應以冬至爲氣應以月遲爲轉應以經朔較氣應爲閏應以氣應得歲周倍三百六十五日四分度之一得七百三十日五十刻以較歲周得周天度分以閏餘得月策以轉應得轉終以交應得交終以月策而一周天度分得數加日行一度得月平行度分
