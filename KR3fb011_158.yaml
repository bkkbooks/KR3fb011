body:
  text: 五段五分六一一九三十三秒一九七九六段五分五七九九五一十三秒一九七九七段五分三四七九七一取火星平立定三差元以一段二差六分一三九八四七加一段三差十三秒一九七九得六分二七一八二六加一段一差八十二分二六五七四得八十八分四七八四是火星盈初縮末定差以一段二差六分一三九八四七加一段三差十三秒一九七九得六分二七一八二六加三差之半六秒五九八九五得六分三三七八一五五為實以一段積度七度六二五為法而一得八十三秒一一八九是火星盈初縮末平差以三差十三秒一九七九折取其中得六秒五九八九五為實以一段積度七度六十二分五十秒而一二次先一次得八十六微五四三六七再除一次得十一微三十五纖是火星盈初縮末立差火星縮初盈末平立定三差元積日二百二十九
