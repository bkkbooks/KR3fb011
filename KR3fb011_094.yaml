body:
  text: 徑得虛隅二分五釐四其虛隅與四其矢合而為五也四其廉者何也倍積則乘出之數為積者四故以四其廉以就之升法以就實也若以截弦與截餘外以求矢則弦畀半弦畀相乘四而三之為實併弦及餘周為益方半弦乘弦加弦畀為從上廉併及餘周為下廉以約出之矢乘上廉又以矢自乘再乘為隅法併二廉以減益方矢自之以乘下廉併減餘從方為法除實得矢測天句股弧矢説句股之弦即弧矢中圓徑也句即弧矢中半截橫弦也弦之長者即股短者句也矢之長者即股短者即句也又矢即股弦較以弧矢圓徑為句股和皆用平方開之或帶從或減從開之步天算曆首以句股弧矢三乘方法割圓為先天之立圓取率取差者也差有平立定三差率有黃赤道二率皆以割圓取之步曆之訣具在範圍焉凡平圓十二立圓三十六故算曆者以圍三徑一然元之郭守敬治曆至今敝少何也以割圓之術取平立定三差故也天地之道陰陽
