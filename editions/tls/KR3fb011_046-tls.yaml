body:
  text: 之得二十九萬九千一百日加至元辛已歲氣應五十五日六刻減大明壬寅歲冬至二十一日三十六刻六三七七餘二十九萬九千一百三十三日六九三六二三爲實以積年八百一十九爲法而一得三百六十五日二十四刻二十六分爲一歲之周亦復非太史所言之歲周也其他月策轉終交終月平行度皆仍舊綱目載宋文帝元嘉六年已已歲十一月朔巳丑日食星晝見又曰日食不盡如鉤經星晝見河北地暗秦地震以授時曆推之元世祖至元十八年辛已歲距宋文帝元嘉六年已已歲八百五十一算中積三十一萬八百二十一日三十六刻七十五分是年十一月冬至三十三日六十九刻二十五分閏餘八日三十二刻八八二五經朔二十五日三十六刻三六七五入朔縮曆一百七十四日二九二四二五入朔縮末曆八日三十二刻八八二五
