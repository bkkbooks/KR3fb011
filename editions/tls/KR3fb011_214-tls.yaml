body:
  text: 附曆元布算法推中積以積年乘歲實得中積推天正冬至以中積加氣應以紀法六十日去之得天正冬至分大餘以甲子算外得日辰小餘以發斂收之五十刻以下爲正刻逢五十刻進一時爲初刻得時刻推次氣累加氣策亦以甲子算外以發斂收之得次氣日辰刻上推者中積內減氣應滿紀法去之六十內減之推閏餘以中積加閏應以月策除之不滿月策者得其年閏餘上推者中積內減閏應以月策除之不及月策月策內減之推經朔以冬至減閏餘得天正經朔求次朔累加月策求弦累加弦策推遲疾曆以中積加轉應減其年閏餘以轉終去之不滿轉終得其年天正入朔疾曆轉中以上減去轉中得遲曆求次月累加月策減轉終疾則爲疾遲則爲遲轉中以上減去轉中疾變爲遲遲變爲疾如是上推以中積加其年閏餘減轉應以轉終
  hash: sha256:1ee7357f51409f7598f50817221006065ba9a126e462bba3d8e883170bff8dc9
