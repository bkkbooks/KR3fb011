body:
  text: 一十三日二刻六十五分巳上日月皆食二十六日五刻巳上日月皆食巳下日月皆不食陰食入交限一日一十五刻巳下月食日不食二十六日五刻巳上日月皆食一十四日七十六刻五十三分巳下日月皆食空日五十刻巳下日月皆食又定翔小餘十二刻日不食八十七刻半巳上日不食定望小餘七十刻月不食三十刻巳上月不食凡驗交食者以交泛犯此條驗之定曆元法天行運數日薄星迴參差互異分秒極微雖絫黍析塵未足相擬也惟恃測驗以求其端璣衡土圭自古而用之周禮日至之景尺有五寸鄭衆以爲表高八尺元郭守敬考定授時曆法乃五倍其表余以表不在高下圭不在長短惟取表端圭正晷景自然合法
