body:
  text: 推月食曆以定望小餘就爲食甚何也月食無時差也推月食入陰陽曆以中交度一百八十一度八十九分六十七秒以下減交定度爲陽曆以上減交定度爲陰曆推月食交前交後度陰陽曆在一百六十六度三九六八以上爲交前以下月不食陰陽曆在後準一十五度五十分爲交後度推月食分秒以十三度五分內減交前交後度餘以八十七刻而一得月食分秒推月食定用以三十分內減月食分秒餘以月食分秒乘之得平方積以平方開之得平方數以四十九刻二十分乘之以定限行度而一得定用分推初虧復圓分以定望小餘卽食甚分內減定用分得初虧食甚分加定用分得復圓分各以發斂收之各得時刻推旣內分以十五分內減月食單分餘以月食單分乘之得旣平積以平方開之得旣平數以四十九
