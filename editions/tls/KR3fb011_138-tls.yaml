body:
  text: 五百八十算五年癸已歲十月丙申朔日食未一刻甚五百七十六算至和元年甲午歲四月甲午朔日食申正一刻甚五百七十五算嘉祐四年已亥歲正月丙申朔日食未三刻復滿五百七十算六年辛丑歲六月壬子朔日食未初刻初虧五百六十八算治平三年丙午歲九月壬子朔日食未二刻甚五百六十三算熙寧二年已酉歲七月乙丑朔日食辰三刻甚五百六十算元豐三年庚申歲十一月已丑朔日食已六刻甚五百四十九算紹聖元年甲戌歲三月壬申朔日食未六刻甚五百三十五算大觀元年丁亥歲十一月壬子朔日食未二刻初虧
