body:
  text: 自西漢以後日食皆距崇禎二年已已歲算之蜀章武元年辛丑歲六月戊辰晦食時加未一千四百八年算魏黃初三年壬寅歲十一月庚申晦日食時加西南一千四百七年算梁中通五年癸丑歲五月朔已未日食時加丙一千九十六年算太清元年丁卯歲正月朔已亥日食時在申一千九十一年算宋文元嘉六年已已歲十一月已丑朔日食不盡如句晝星見加時在未一千一百九十五算陳大建八年丙申歲六月戊申朔日食卯甲間一千五十三算唐永隆元年庚辰歲十一月朔食時已四刻甚開耀元年辛已歲十一月丙寅朔日食已初甚九百四十八算嗣聖八年辛卯歲四月壬寅朔日食時卯二刻甚
