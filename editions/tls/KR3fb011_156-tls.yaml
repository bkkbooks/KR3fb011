  text: 星盈初縮末一百十四度七十二刻以八段而一第一段十四日三十四刻積之得積目段目積差一差一段六度二六八二五一二二八二八十二分二六五七四二段十一度六一七五七四三六七十六分六六七一一七三段十六度二五九六三七九二六七十分五八一一四段十九度六九一三二一三六十四分一八二九七五段二十二度九八九七六一五十八分四三九六六段二十四度一六八二二八六三三五十二分八二七一三七段二十五度三三一五五二四九二六四十七分三四七一七八八段二十五度六一九五一五六六四十一分九九九二六求其段二差三差法以一差較得二差二差較得三差段目二差三差一段六分一三九八四七十三秒一九七九二段大分七八六八十三秒一九七九三段五分八七八五八八十三秒一九七九四段五分七四三九九十三秒一九七九
