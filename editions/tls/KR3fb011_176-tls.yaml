  text: 二差二差相較得三差段目一差二差一段三分四九六八一八二五五秒五九七六二五二段三分四四八四二九秒三二七七五三段三分三四七五七一二五十三秒五六五二五四段三分二一七六十六秒七八五九七五五段三分四九一四六二五二十秒五一五四二五六段二分八四三九九二二十四秒二四四八七五七段二分六一五四三二五二十七秒九七四三二五八段二分三二一八以二差減二差得三差三秒七二九四五俱同不復錄以三差折取其中得一秒八六四七二五加一段一差得三分五十一秒五十五微爲金星盈縮定差以二差五秒五九七六二五內減三差三秒七二九四五餘一秒八六八一七五以較三差折取其中得一秒八六四七二五餘三十四纖半爲實以一段積日十一日五十刻爲法而一得三纖爲平差
