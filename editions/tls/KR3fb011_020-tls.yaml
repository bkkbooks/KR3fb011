body:
  text: 二秒復圓二十二刻十四分八十七秒臣在山中下漏測候初虧八刻四十分八十六秒三十二微復圓二十二刻三十七分九十七秒五十八微是推算在後而食在先也自天順四年至天啓四年凡一百六十三年其間日月交食不驗者尚多卽此數條已知曆法之不正矣再以大統曆法推天啓三年癸亥歲十一月朔丁已卯初二刻冬至臣立表測驗日景以法布算得是日辰初二刻冬至則大統法先天一時夫氣者曆之根本諸法禀焉七政四餘所繇起也本失而求末之正得乎是時適逢日低月高之會臣以漏水測得本月十四日庚午夜半後二十八刻四十一分月離最低較大統曆轉應後天三時六刻夫氣失一時轉失三時六刻是日月躔離兩俱不合惡得布算朔望交食不爽也臣以所測氣轉諸數定爲四應卽以此法上推天順四年閏十一月月食與天合正德九年八月日食與天合萬曆四十年五月日不食與天合
