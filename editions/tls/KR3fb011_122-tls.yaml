body:
  text: 法以四十四日卽內外半弧背黃赤道半弧弦十度二十五分六十九秒卽黃赤道小弦以二至出入差半弧背十九度九十六分十四秒乘之以二至黃道內外半弧弦二十三度七十一分而一得十四度五十二分八十秒爲出入差半背以周天經一百二十一度七十五分內減黃赤道內外二矢五度三分六十二秒餘一百一十六度七十一分三十八秒以三因之加一刻得三百五十一刻一十四分一十四秒加一刻爲日行百刻度分以出入差半弧背十四度五十二分八十五秒以日行百刻乘之得一千四百五十二度八十五分以三百五十一刻一四一四而一得四刻一十三分七十五秒爲出入差以昏明二十五刻內減出入差四刻一十三分七十五秒餘二十刻八十六分二十五秒爲四十四日半晝刻倍之得四十一刻七十二分五十秒爲晝刻以減百刻餘五十八刻二十七分五十秒爲夜刻曆測上卷終
