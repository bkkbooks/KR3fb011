body:
  text: 得二百八十度二三三六三七五加入加時行定度及加冬至加時日𨇠赤道箕宿十度共得四百五十二度六五八六九七五再加半歲周共得六百三十四度六八七一一九去天度分餘二百七十九度四二九六一九月孛度率八日八四八四九二乘之得月孛至後策二千四百七十二日五三七四八羅計至後策元以交終二十七日二一二二二四內減交應二十六日三八八餘一日一七三四二四加閏餘得二十一日三七八四二四以月平行度乘之得二百八十五度八二八五八五加入加時行定度一百六十一度八三二八六及冬至加時日躔赤道箕宿十度再加半歲周一百八十二度六二二五共得六百四十度二五六八六以去周天度三百六十五度二五七五餘二百七十四度九九九三六以減周天度分餘九十度二五八一四以羅計度率十八日五九九一七七六乘之得一千六百七十八回
