body:
  text: 歙方一藻子玄正滿城魏文魁太一考曆元直指粵自元天列象曆數用興上古聖人玄神仰契綜運數之原探象緯之秘爰作甲子以紀之璣衡以儀之渾混無端之中陽精特炯轍迹有率因是剖界蒼穹分畫經宿周天度數繇斯起也天步西旋日輪東馭南至北至各有其極每東西未竟厥途南北蚤迴其轡運化密移差以黍絫故歲周之策小讓天周一歲之日四之爲春秋冬夏八之爲分至啟閉二十四之爲氣七十二之爲候一日之日十有二之爲時百之爲刻是故積而朞歲乃合天體析而分秒制月星之紀然後七政可齊五辰可撫度日以寸度月以尺故日行謂𨇠月行謂離月之東徙及日同度曰朔相對曰望中分朔望之半曰弦靡不準日以爲言若乃東西度周未及會朔而環轉吿終故謂之轉終其南北周數縮於東西亦猶日輪蹍天途未竟而轡已迴則
