body:
  text: 喜越七年領郡上谷迫欲因書識其人則邢觀察往矣客有言魏生者延置郡閣抵掌累日玄象進退往復之故曁曆象考測諸法繇唐虞迄勝國靡不鉤索深隱洞究合離因岀曆測一編細爲簡閲浮采芟滌數法賅存譬衡設而輕重在懸足闡冲之未竟之業令守敬瞠乎後者不意千古曆法至今克明眞熙代盛事也魏生志僻服野髮種種須杖始行獨於今古未明一
