body:
  text: 㤗昌元年十一月月食與天合天啓元年四月日食與天合是法也上推已住旣皆相合下推將來惡有不合者哉臣又嘗以臣法預推天啓五年乙丑歲八月十五日辛卯望月食分秒時刻驗之悉合凖授時曆法推之不合又甞以臣法預推天啓六年丙寅歲閏六月十六日丙辰夜望月食十二月十五日癸丑夜望月食天啓七年丁卯歲七月朔乙丑日食十二月十四日丁未夜望月食分秒時刻驗之悉合凖授時曆法推之悉皆不合如臣之法詳加測候考正曆元可以一洗胡元之陋成一代之寳曆定萬禩之章程葢自太祖高皇帝成祖文皇帝南北兩都並置欽天監奉若天道旣衆務畢舉矣獨斯事體大懸俟聖子神孫脩明厥典伏見皇上敬天勤民宵旦圖治此乃天道昭明之秋氣運休嘉之會輙敢效其區區願佐
  hash: sha256:fdce036e9f1aee534362e8c7ec394379a2e5ceabe47226717ca63924d25be08d
