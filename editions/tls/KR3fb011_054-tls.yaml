body:
  text: 初虧辰初二刻西北食甚辰正三刻正北復圓已初四刻東北食甚日𨇠黃道斗宿二度六十二分九十八秒五十一微綱目云日食晝星見又云不盡如鉤以授時曆法推求止六分九十六秒何云不盡如鉤何云晝星見固知郭曆舛矣今又三百四十七年其差甚矣魁著曆測一書待同志者修改云
