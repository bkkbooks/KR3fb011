body:
  text: 潘彦登曰余幼好天官生躭星歷顓門無受億中自勞嘗辨窻艸榮枯或感盆魚陟降有時會意終夜營思惟尼父智詘二兒之爭莊生辯窮六合之外因而遊神寥廓殫慮忽荒緣習生常迨壯彌力咀微言於古聖攬剙法於名家凖昜攡玄守泊大揚子夜星書籍積思官讓更生時驚太乙靑藜每詫天章碧漢未當高士憾乏明微在癸亥歸餘孟冬悟日至於焉從朔曁甲子聚星鳥嗉忻天運繇此重開偶上郭隗金臺省我舅氏因識天孫機石覿此畸人一豁疑情頓躋玄覺嗚呼興贒舉逸二千石紀綱人倫治曆明時億萬年終始天道蒼穹碧落眞畵難繪其淸磨轉蟻行深觀莫原其變淸言善於標位手筆取乎錯綜聊因卷帙告竣紀兹邂逅勝事云爾崇禎二年閏四月辛酉逸史歙中潘彦登先于書筞
