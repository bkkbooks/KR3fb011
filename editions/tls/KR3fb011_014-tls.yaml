body:
  text: 擬奏考定曆元疏稿直隷保定府滿城縣儒學生員臣魏文魁謹奏爲恭進曆元考測眞數仰佐欽若至心伏乞聖明俯賜睿裁以成皇朝鉅典事臣竊惟撫辰齊政治曆明時聖帝明王之先務也我太祖高皇帝驅逐胡元成祖文皇帝蕩掃沙漠再闢乾坤重輝日月於是萬法更始庶政聿新惟兹曆象之官當時旁求未獲以故曆名大統數仍授時葢將以有待也謹按授時曆法雖頗詳宻至於分秒竒零未免失之絫况今更歷三百餘載積漸推移頗多舛错竊見邇年閏餘乖次氣朔愆期甚至交食不效有推算在先而測驗在後有推算在後而測驗又在先有應食不食不應食而食諸如此類
  hash: sha256:c373beca17daf08a4937780ed947b04282c47c4ca0c88ef3241f082757ccfdb0
