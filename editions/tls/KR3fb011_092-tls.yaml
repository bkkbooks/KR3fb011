body:
  text: 股較乘之亦得句畀卽半截畀也矢自乘圓除之得半背弦差倍以加弦卽弦背以半背弦差除矢畀亦得圓徑半截弦自乘爲實以矢除之得矢徑差加矢卽圓徑以矢加弦以矢乘而平方開之卽所截之積也倍截積以矢除之減矢卽弦倍截積以弦爲從方開之卽矢惟弧背與徑求矢截積與徑求矢開不能盡用三乘方法開之弧背求矢以半弧背畀與徑畀相乘爲實徑乘徑畀爲從方徑畀爲上廉全背與徑乘餘爲下廉約矢乘上廉以減從方以矢自乘以減下廉以矢自乘下廉與減餘方方爲除實得矢何爲以矢乘上廉減從方也蓋從方乃徑與徑畀相乘其中多一矢乘徑畀之數八減之何爲又以矢自乘以減下廉也下廉乃背徑相乘其中多一矢自乘之數故以減之則法與實相合矣以截積求矢則倍積自乘爲實四因積爲上廉四因徑爲下廉五爲負隅約矢以隅因之以減下廉又以矢一度乘上廉兩度乘下廉併而爲法矢減下廉者何也矢本減徑而得故減徑以求之五爲負隅者何也凡以方爲圓每一寸
