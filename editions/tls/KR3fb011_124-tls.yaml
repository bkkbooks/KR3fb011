body:
  text: 歙方一藻子玄正滿城魏文魁太一考交食元日食有時氣刻三差者何也日先月後兩相追逐者也日先躔於交道而月從後追及之如食在正交之故日南月北食由西北而虧甚于正北復於東北如食在當交之中食自正西而入復于正東如食在正交之後日月出於交道東行日躔于北月離於南日亦𨇠於前月亦追於後而及之光相粘也月南而日北虧於西南甚於正南復於東南也何爲食時有差耶合朔者日月所會日上月下也如食於午正者人立正北望日月於正南則無差矣何也日上而南月下而北人仰視日而月適承之中隔人目所以無差也如日食晨刻午前也日月相會一南一北人東視之穿於日月中封之間所以有差必將差刻加於合朔之上使其早見及月未合朔而先下遮人目上遮日體故曰中前爲加如食在夕刻午後也日月亦一
