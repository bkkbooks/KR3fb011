body:
  text: 徑得虛隅二分五釐四其虛隅與四其矢合而爲五也四其廉者何也倍積則乘出之數爲積者四故以四其廉以就之升法以就實也若以截弦與截餘外以求矢則弦畀半弦畀相乘四而三之爲實併弦及餘周爲益方半弦乘弦加弦畀爲從上廉併及餘周爲下廉以約出之矢乘上廉又以矢自乘再乘爲隅法併二廉以減益方矢自之以乘下廉併減餘從方爲法除實得矢測天句股弧矢説句股之弦卽弧矢中圓徑也句卽弧矢中半截横弦也弦之長者卽股短者句也矢之長者卽股短者卽句也又矢卽股弦較以弧矢圓徑爲句股和皆用平方開之或帶從或減從開之步天算曆首以句股弧矢三乘方法割圓爲先天之立圓取率取差者也差有平立定三差率有黃赤道二率皆以割圓取之步曆之訣具在範圍焉凡平圓十二立圓三十六故算曆者以圍三徑一然元之郭守敬治曆至今敝少何也以割圓之術取平立定三差故也天地之道陰陽
