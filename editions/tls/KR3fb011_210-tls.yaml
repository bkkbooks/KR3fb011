body:
  text: 度也其法常以月孛每九年最高最低一次測候遲疾之數爲定法之初魁自萬曆四十七年已未歲六月七月太陰最低測得月轉數差三分日之一今又更九年矣恭逢新天子聖明臨御崇禎元年戊辰歲五月望之前後六月望之前後太陰遠出黃道之外最低之處測定遲疾轉應轉終分秒並得眞數卽以此法推是年十二月十六日壬寅夜望月食三分六十三秒初虧戌初三刻一更一點東南起復圓亥初三刻一更五點西南復又推崇禎二年巳巳歲閏四月乃仲夏五月朔乙酉日食三分九秒初虧巳初三刻陽曆西南起復圓午初二刻東南復並從實刻推得可見大統授時算法寔多舛誤敢吿司曆當知交食不驗曆安得正氣失九刻轉失三十六刻交失四刻有奇推算安得復驗交食旣失前後定朔時刻必差若置子半之交或以晦作朔或以朔作晦前後隔差一日也若置元旦便隔差一歲則履端更始之日景福維新之期何以迓一歲之太和哉夫曆安可不正也余修曆測
