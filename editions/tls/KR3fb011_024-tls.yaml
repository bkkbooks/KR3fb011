body:
  text: 聖治萬分之一臣今年踰七十犬馬齒衰一亘塡委溝壑則使窮年管蠡闚測竟就湮没墜千古之絕學辜先世之良法安敢終隱不言取戾聖世伏乞皇上俯埀睿覽勑下禮部細加考驗如果臣言不謬准行欽天監將舊曆訛舛䖏槩從改正頒行天下補皇朝之曠典急堯舜之先務皇天祐命於萬斯年永永無極從兹始矣臣不勝悚慄待命之至
