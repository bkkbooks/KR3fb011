body:
  text: 周天三百六十五度二十五分周天經度一百二十一度七十五分半經六十度八十七分半黃道半弧背二十四度黃赤道弧矢四度八十四分八十二秒黃赤道大句三十三度八十分七十秒黃赤道大股五十六度二分六十八秒問半弧背二十四度黃赤道矢若干答曰四度八十四分八十二秒法以半弧背自之得五百七十六度爲半背畀以周天徑自之得一萬四千八百二十三度六二五爲上廉又經畀以上廉乘半背畀得八百五十三萬八千百八十四度爲正實以周天度徑乘上廉得一百八十萬四千七百七度八五九三七五爲益從方以半弧背倍之得四十八度乘周天徑度得五千八百四十四爲下廉
