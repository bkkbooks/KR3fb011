body:
  text: 入朔縮差度九三三三一八一九加差三十三刻六三六定朔三十五日二一一三五入朔縮定曆一百六十二日七七二六一入朔縮定末曆一十九日八四八六四縮定縮差度九一九四六七入朔加時行定度一百六十一度八五四一一四天正入朔加時赤道一百七十一度八五四一一四四餘法元法曰以氣應五十五日六刻內減閏應二十日一十八刻五十分餘三十四日八十七刻五十分日命爲度加天正冬至加時赤道箕宿十度共得四十四度八七五以紫氣度率二十八日乘之得紫氣至後策一千二百五十六日五十刻爲紫氣至後策月孛至後策術以轉終二十七日五五四六內減轉應十三日一九四餘十四日三六四二加閏餘二十日一八五共得三十四日五四九二以減轉中十三日七七七
