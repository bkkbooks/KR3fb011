body:
  text: 天啟七年丁卯歲十二月十四日丁未望月食十二分三十秒曆官報復圓辰初三刻不見復光八分四十六秒測候復圓在天二算自漢高后七年庚申歲始至大明天啟七年丁卯歲止其間日食有時刻者三十六月食有分秒時刻更唱更點者十七共計五十三食上下一千八百八年以備測驗考推曆元五星元測五星法以五星晨留日夕留日夕晨留日折取其中得定合以平立定三差取度差加減之得五星平合以至後平合距以至後平合紀得五星周日以周日之度再以周天度除之得度率度率者何也一度行幾日也以度率乘周天度得曆率以八段而一各得段日而測平立定三差之元五星定平立三差法元木星元定平立差法段目積日積度
