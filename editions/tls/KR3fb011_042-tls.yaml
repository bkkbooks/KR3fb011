body:
  text: 至元二十年命太子論德李謙修曆志曰可以貽永久迨至元三十一年甲午歲五月十五日望月食不效差天二刻遂改閏應加二刻轉應減十九刻交應雖改其實毫釐未動各附至元十八年辛已歲爲元氣應五十五日六刻閏應二十日二十刻五十分轉應十三日二刻五分交應二十六日三刻八十八分卽金重修大明曆交泛分天正冬至日𨇠箕宿十度李謙云可以貽永久甲午歲去辛已歲才十四年朔差二刻轉差十九刻貽永久者安在乎太史郭守敬云諸數隨時測改不用爲元自辛已歲至今崇禎元年戊辰歲三百四十七年考驗未有其人余今立表測候巳十年矣測知氣差天一時有奇轉差天四時稍強交差天四刻弱故留法於後世知測驗者更正焉元史所載歲周三百六十五日二十四刻二十五分太史令郭守敬云自宋武帝大明六年壬寅歲積八百十九年以至元十八年氣應五十五日六刻加
