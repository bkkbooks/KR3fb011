body:
  text: 六氣也春分前淸明穀雨立夏小滿芒種距夏至六氣也各差二日四十刻奇將九十二日七十二刻分爲六段每一段該十五日六十二刻就倍之得二段積日以三因第一段積日一十五日六十二刻得第三段積日四因得四段積日五因得五段六因得六段積日開後段目積日段目積日一段十五日六十二刻二段三十一日二十四刻三段四十六日八十六刻四段六十二日四十八刻五段七十八日一十刻六段九十三日七十二刻段目積差一段七十刻五八三八一八七七九一二段一日二十九刻七六六一三九一九三一三段一日七十六刻九二九五七三三五六九四段二日一十一刻四五六七三三三八五二五段二日三十二刻七三二三一三九三六段二日四十刻一三二六七九四九五一具以尖圓法開後
