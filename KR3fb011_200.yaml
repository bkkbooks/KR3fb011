body:
  text: 七二八七二為羅㬋至後策以羅㬋至後策加羅計半周積三千三百九十六日七十二刻十六分得計都至後策五千七十五日四四二四七二明曆測總法元金重修大明曆日法五千二百三十分歲實一百九十一萬二百二十四分以日法而一歲實得歲周三百六十五日二十四刻三十五分九四六六收之為得歲周三百六十五日二十四刻三十五分倍周天度三百六十五度四分度之一得七百三十度五十分以減歲周餘得周天度分三百六十五度二十五分六十四秒以日法而一朔實得二十九日五三五九二七三四二二六收之得三秒得月策二十九日五十三刻五分九十三秒以月策而一周天度分三百六十五度二十五分六十四秒得十二度三六八七四五八六加日行一度得月平行度十三度三十六分八七四五八六以月策除歲周十二次餘十日八十七刻六四九六
