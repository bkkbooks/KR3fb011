body:
  text: 求定限行度以加減差加減遲疾曆以十二限二十乘之以遲疾行法推得行度內八分二十秒得定限行度推日食午前午後分定朔小餘五十刻以下五十刻內定朔小餘得午前分定朔小餘五十刻以上減五十刻餘得午後分推時差以五十刻內減午前午後分餘以午前午後分乘之以九十六刻而一得時差午前為減午後為加推食甚以時差加減定朔小餘得食甚推距午以時差併午前午後得距午推日月食交常交定度以入朔望交泛乘月平行度得交常度加減盈縮差得交定度推食甚入盈縮行定度以盈縮曆加定朔大餘及食甚分減經朔大小餘得食甚入盈曆以盈縮差加減之得食甚入盈縮行定度推南北泛差以盈縮行定度象限以下為初限以上減半歲為末限或初或末自乘之一千八百七十
