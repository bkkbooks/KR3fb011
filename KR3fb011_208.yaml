body:
  text: 以月孛度率乘周天度分得三千二百三十二日五刻四十三分三十三秒不及三秒曆法收之爲紫氣周積以交終而一周天度分得十三度四二二五五二三以月乎行度減之得羅計日行分五分三七六九一九以羅計日行分而一一度得羅計度率十八日五九八一一以羅計度率乘周天度分得羅計周六千七百九十三日六刻三十分三秒不及三秒收而用之以折半羅計周積得半周積三千三百九十六日五十三刻一十五分一五四餘法前史無所載魁始祖釗留下四餘通軌一卷傳至大父端先大人道親授於魁書中所載皆金重修大明曆觀法我明所頒大統七政曆後有四餘躔度一篇是也是以知元郭守敬王恂修授時曆皆不識四餘根源也蓋自金大定庚子歲迄今崇禎二年已已歲歷四百五十年矣更無一人言四餘之訛謬者所謂四餘者何紀四應之法也紀閏餘氣朔紀月離高低紀交食躔
