body:
  text: 四六三以度率十八日五九九一七七六乘之得一千六百七十八日六四五三四五一加羅計半周積三千三百九十六日七十二刻十六分共得計都至後策五千七十五日三六六六此一法也若以元至元三十一年甲午歲再測附十八年辛巳歲四應氣應五十五日六刻閏應二十日二五轉應十三日二五交應二十六日三八八天正經朔三十四日八五五天正冬至加時日躔赤道箕宿十度紫氣至後策法元術以冬至五十五日六刻內減閏餘二十日二五餘三十四日八五五加冬至加時日躔赤道箕宿十度共得四十四度八五五以紫氣度率二十八日乘之得紫氣至後策一千二百五十五日九十四刻
