body:
  text: 一二差一分五四八一五八一二五較三差三十九秒五八二一三七五餘六十五秒八九九四四七七五餘四十六秒一八三七五為實以一段下積度一十五度二十五分為法而一得三秒二三五為縮初盈末平差以三差三十九秒五八二一三七五折取其中得一十九秒七九一六八七五為實以一段下積度一十五度二十五分為法而一二次先除一次一秒九七五為實又法積度一十五度二十五分為法而一得八微五十一纖為火星縮初盈末立差土星平立定三差元土星平立定三差法元三百三十六日一段之日行十一度四十二分一段之度二百六十八日有奇分一段積度十一度四十二分八段積度是一象限之數盈曆初末差八度二十五分有奇段目積日積度一段三百三十六日十一度五十分二段六百七十二日二十三度
