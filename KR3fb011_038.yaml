body:
  text: 策得下弦策以三十除歲周得土王策以三歸氣策得候策以三十日減月策為盈數十六日內減氣策為虛數以四除周天得象限減二日四一四為盈限加二日四一四為縮限其千頭萬緒皆出於此曆元參考術以冬夏至前後日景為冬夏二至刻分得測年之氣應余考二十一史中修曆者七十餘家測日景推冬至日刻分者僅得二人史載劉宋武帝大明五年辛丑歲祖沖之立圭表測得十月初十日壬戌景長丈七寸七分半又測得十一月二十五日丁未景長丈八寸一分太太者七釐五毫二十六日戊申景長丈七寸五分強強者九釐五毫以壬戌景較戊申景餘一分五釐五毫為實以丁未日景較戊申日景餘五分八釐為法除實得二十六刻七十二分四十五秒為至刻差以壬戌日距戊申日得四十六日內減至刻差餘四十五日七十三刻二十七分五十五秒折取其中得二十二日八十六刻六三五七五加入夜半後自子到午半日五十刻得二十三日三十六刻六十三分七
  hash: sha256:6433e2e157521d636d89f7f115abdb011cf2b8113e581958edecd66d8f652890
