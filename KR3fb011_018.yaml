body:
  text: 聖聽爰述舊法相沿之失并及實測可憑之數伏候聖明裁察如天順四年庚辰歲閏十一月十六日戊午望早見月食英宗睿皇帝責掌欽天監事禮部侍郎湯序失推算之罪是推算不應食而食也正德九年甲戌歲八月朔辛卯日有食之曆官所報日食八分六十七秒測候分祕殆盡是推算食少而反多也萬曆四十年壬子歲五月朔甲午日食七分七十三秒初虧酉正一刻日未入見食一分八十八秒測候至日入日體未缺是推算應食而不食也泰昌元年庚申歲十一月十六日已丑夜望月食既初虧子正一刻測候子初三刻是推算在後而食在先也天啓元年辛酉歲四月朔壬申日食三分九十一秒初虧申正三刻測候酉初一刻日食分秒約四分有竒是推算在先而食在後也推之分秒少食之分秒多也天啓四年甲子歲大統曆推八月十四日丙申夜望月食既初虧丁酉夜半後九刻二十七分二十
