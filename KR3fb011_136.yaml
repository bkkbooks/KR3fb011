body:
  text: 九百三十八算十七年庚子歲五月已丑朔日食時申初甚九百三十算十九年壬寅歲九月乙丑朔日食申三刻甚不盡如句九百二十七算二十年癸卯歲庚寅朔日食既景龍元年丁未歲六月丁卯朔日食午正甚九百二十算開元九年辛酉歲九月乙已朔日食午正後三刻甚九百八算宋仁宗天聖二年甲子歲司天監奏五月丁亥朔日食時在已刻候之不食終午不食百官具表賀諸曆以為然六百五算慶曆六年丙戌歲三月辛已朔日食申正三刻復滿五百八十三年算皇祐元年已丑歲正月甲午朔日食午正甚
