body:
  text: 五百七十七算嘉祐八年癸卯歲十一月癸未望月食卯七刻甚五百六十六算熙寧二年已酉歲閏十一月丁未望月食亥六刻初虧子五刻食甚丑四刻復滿五百六十算元至元三十一年甲午歲十一月壬戍望月食酉初刻食旣酉正一刻生光三百三十五算成宗元貞元年乙未歲十一月乙卯月食酉正初刻虧亥初二刻復圓三百三十三算大明天順四年庚辰歲閏十一月戊午望月食卯正二刻初虧見食四分強弱之間臺曆不食誤一百六十八算天啟六年丙寅歲十二月十五日癸丑望月食曆官報一更一點初虧測候初虧在晝三算
