  text: 六段七分九八五四七六五度五九九七八四四七段七分二八一七四五五度八六一八四七二五八段六分五一五五九二五度九九四三四四六四以其段積度而一其段積差得一差段目二差三差一段三十九秒一六二一六秒二四二二二段四十五秒四四三六秒二四二二三段五十一秒六四六五六秒二四二二四段五十七秒八八八七六秒二四二二五段六十四秒一三九六秒二四二二六段七十秒三七三一六秒二四二二七段七十六秒六一五三以一差多減少得二差以二差相較得三差法以一段二差三十九秒一六二一內減三差六秒二四二二餘三十二秒九一九九加其一段一差十分五六七八一得十分八十九秒七十微為木星定差以三差六秒二四二二折取其中得三秒一二一一
