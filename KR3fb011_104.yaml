body:
  text: 廉得一十四萬二千八百九十四度三二二五以減益從方餘一百六十六萬一千八百一十三度五三六八七五為從方以初次再次三啇四度八四自之得二十三度四二五六加初次自之之數得四十六度四六五六以減下廉餘五千七百九十七度五三四四以乘九度六十四分得五萬五千八百八十八度二三一六一六為從廉併從方得一百七十一萬七千七百一度七六八九四一為法除餘實餘實一萬四千一百八十六度六四五八六四三六為再又次餘實以初次再次三啇倍之加八十秒乘上廉得一十四萬三千六百五度八二九五以減益從方以四度八十四分八十秒自之得二十三度五三一四以加初次再次三啇自之之數得四十六度九二八七四以減下廉餘五千七百九十七度七一二九六以乘九度六八八得五萬六千一百六十二度二六七一五六四八為從廉併從方得一百七十一萬七千二百六十四度五六五九六四八為法除再
