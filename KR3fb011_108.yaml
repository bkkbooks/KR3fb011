body:
  text: 度四度八四八二餘五十六度二六八為黃道小弦即大股以小弦乘大股得三千一百三十九度二三一八二四以半徑六十度八十七分五十秒而一得五十一度五六四七為黃赤道小股以矢度四度八十四分八十二秒自之得二十三度五五以周天經一百二十一度七十五分而一得一十九分三十秒為黃赤道半背弦差以減半背二十四度餘二十三度八十分七十秒為黃道半弧弦以半弧弦自之得五百六十六度七七三二四九為弦畀以黃赤道小股五十一度五六四七自之得二千六百五十八度九一八二八六九為股畀以併弦畀得三千二百二十五度六九一五三五九以平方開之得五十六度七九五一為赤道小弦以半弧弦二十三度八十分七十秒乘半徑六十度八十七分五十秒得一千四百四十九度二五一一
