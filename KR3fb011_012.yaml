body:
  text: 潘彥登曰余幼好天官生耽星歷顓門無受億中自勞嘗辨窗草榮枯或感盆魚陟降有時會意終夜營思惟尼父智詘二兒之爭莊生辨窮六合之外因而遊神寥廓殫慮忽荒緣習生常逮壯彌力咀微言於古聖攬創法於名家凖昜攡玄守泊大揚子夜星書籍積思官讓更生時驚太乙靑藜每詫天章碧漢未當高士憾乏明微在癸亥歸餘孟冬悟日至於焉從朔暨甲子聚星鳥嗉欣天運繇此重開偶上郭隗金臺省我舅氏因識天孫機石覿此畸人一豁疑情頓躋玄覺嗚呼興賢舉逸二千石紀綱人倫治曆明時億萬年終始天道蒼穹碧落真畫難繪其淸磨轉蟻行深觀莫原其變淸言善於標位手筆取乎錯綜聊因卷帙告竣紀兹邂逅勝事云爾崇禎二年閏四月辛酉逸史歙中潘彥登先于書策
