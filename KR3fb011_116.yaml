body:
  text: 度二三三八五以大股四十三度一六而一得一十九度八十七分為出入半弧弦以出入半弧弦求得出入半弧背十九度九十六分一十四秒以二至出入差半弧背以黃道入出內外二十三度七十一分而一得八十四分一十九秒為差度以半徑減黃道矢餘五十六度六分五十秒為立股又曰立句以黃道大股矢自之以周天徑而一得半弧背弦差加黃赤道半弧弦得半弧背以黃赤道度距盈初縮末為加差縮初盈末為減差皆加減象限九十一度三十一分四十三秒得各日去極度分秒問盈初曆四十四日去極度分秒以半周天徑六十度八七五減赤道小弦五十八度三五六九餘二度五十一分八十一秒為黃道距赤道內外矢度分以半周天徑度內減四十四日下矢度分十六度五六八二餘四十四度三十分六十八秒為黃赤道小弧弦以二至出入半弧弦二十三度七十一分乘之以黃赤道大弧弦六十度八十
