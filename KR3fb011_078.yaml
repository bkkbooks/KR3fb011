body:
  text: 二秒四十二微加平差二分二十一秒得二分三三四二以四十六日再乘之得一刻七三七三二以減定差四刻八十七分六秒餘三刻七九六八六八又以四十六日乘之得一度七十四分六五五九二八合問度卽日日卽萬百卽刻刻卽分測太陰遲疾平定立三差法元太陰二十七日五十五刻四十六分一周天度曆家收爲二十八日推算以朔至上弦七日上弦至望七日望至下弦七日下弦至朔又七日四七二十八日以四歸二十八日得七日以十二時因之得八十四限分爲七限每限一十二就爲第一段倍之得第二段積限三因十二限得三段積限以四因得四段五因得五段六因得六段七因得七段積限匝天一周段目積限積差一段十二限一度二八七一二二段二十四限二度四五九六一六三段三十六限三度四八三七九二
