body:
  text: 一百八十八度五二三一三七九五以月平行度而一得十四日一一七七七五為交泛分附於至元辛已歲加閏應得交應以虧復並折得八十二刻四四六以望日丙辰加之得五十二日八十二刻四四六以減加差餘五十二日七十八刻一五為經望退於甲午年十二月經望五十八日四一二八八五五以減望策十四日七六五二九六五餘四十三日六四七五八九為十二月經朔以減月策餘十四日一一六九九六為十一月經朔以減冬至六十三日二一二五餘四十九日九五五四以月策除之餘一十九日五六四九一一為甲午歲天正冬至距朔日刻分名曰閏餘退於至元十八年辛巳歲天正冬至距朔日刻分二十日二十刻五十分為閏應其他仿此古今日食備考漢高后七年庚申歲七月日食晝晦加時未申距今大明崇禎二年已巳歲一千八百八年算
