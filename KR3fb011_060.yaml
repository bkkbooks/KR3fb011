body:
  text: 四段十三刻八三三一九六三取定立平三差法術以四因三差六十分五四二一一一得二刻四二一六八四四四以減一段二差一十二刻一六七五六三餘九刻五九五七一八六折半得四刻七九七五三五九三寄位以六歸三差六十分五四二一一一得一十分九三五一八三四加寄位內得四刻八九八四三九四四八三四再加一段下一差五十九刻一五八八二八二六共得六十四刻五七二六七七八又加一段二差一十二刻一六七五六三共得七十六刻七四二四為實以一段下積日一十四日八十二刻為法而一得積度下定差五刻一十三分三十二秒以三差六十分五四二一一一倍得一刻二一八四二二二減一段二差一十二刻一六七五六三餘一十刻八五九一四八為實以一段積日十四日八十二刻為法而一二次先除一次得七
