body:
  text: 二分四八九七五爲實以一段積日十一日五十刻而一得二十一微六十五纖爲水星盈縮平差以三差折取其中一秒八四六七二五爲實以一段積日十一日五十刻爲法而一二次先除一次得十六微二一五再除一次得一微四十一纖爲水星立差五星加減者以積度乘立差加平差再乘之減定差又乘之得積差積差者盈縮差也盈加縮減爲定日定星也明四餘法元曆法疏密驗在交食準於凌犯課二曜之貞明推五星之垂象交食一錯則朔望何以密探五星少差則災祥豈不異路然推步之術難得其眞加時早晚食數淺深貴在密合不容疏率推演凌犯豈曰容易若明四餘必識三應紫氣應閏餘氣朔月孛應遲疾轉分羅計應交食始終四餘明七政正曆法千頭萬緒畢矣四餘曆元
