body:
  text: 二分四八九七五為實以一段積日十一日五十刻而一得二十一微六十五纖為水星盈縮平差以三差折取其中一秒八四六七二五為實以一段積日十一日五十刻為法而一二次先除一次得十六微二一五再除一次得一微四十一纖為水星立差五星加減者以積度乘立差加平差再乘之減定差又乘之得積差積差者盈縮差也盈加縮減為定日定星也明四餘法元曆法疏密驗在交食準於凌犯課二曜之貞明推五星之垂象交食一錯則朔望何以密探五星少差則災祥豈不異路然推步之術難得其真加時早晚食數淺深貴在密合不容疏率推演凌犯豈曰容易若明四餘必識三應紫氣應閏餘氣朔月孛應遲疾轉分羅計應交食始終四餘明七政正曆法千頭萬緒畢矣四餘曆元
  hash: sha256:06ebc02321a3b35a2862de1bf5c1c4c53167c99f525d2e600e3c6ef347713c25
