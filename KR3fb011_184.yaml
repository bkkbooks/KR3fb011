body:
  text: 今大統四餘者乃金重修大明曆法也卻與授時曆法亦復不合何以知之自金世宗大定二十年庚子歲距元世祖至元十七年庚辰歲一百一算得冬至五十五日二十五刻閏餘二十日三十七刻四十二分以閏餘減冬至餘三十四日八十七刻五十八分為至後日又云天正經朔是年元太史令郭守敬測到冬至日躔赤道加時十度加於至後日內共得四十四度八十七分五十八秒以紫氣度率二十八日乘之得至後一千二百五十六日五二二四周天度分三百六十五度二十五分六十四秒以度率二十八日乘周天度分得一萬二百二十七日一七九二為紫氣周積歲周三百六十五日二十四刻三十六分以度率而一一度得三分五七一四二九為日行分重修大明曆細録於後元世祖至元十八年辛已歲歲周三百六十五日二十四刻三十六分
