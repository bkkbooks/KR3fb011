body:
  text: 憚大書特書即近聖如丘明絶未一衍交食之義詎存而不論夫亦聖有不知耶漢諸儒仲舒向雄輩群以明天道自詡顧災祥徵應互舛玄文鑿祭率墮冥虛揆厥所繇於數於法槩未有曙蒼蒼者亦任其遠而無至極耳粵惟劉宋祖沖之研精兹學窮極數法爰製大明曆日月星辰運旋遲疾纎悉顜若畫一質諸亘古有神聖復起莫能損益者於時惜格異議曆法猶晦未
