body:
  text: 即句弦較句股較加句股和半之為股減句股和半之為句股較加股弦和半之為弦減股弦和半之為句股弦較加句弦和半之為弦減句弦和半之為句弦和較加弦和和半之為和減弦較和半之為弦弦較較加弦較和半之為弦減弦較和半之為較化而裁之存乎變推而行之存乎通神而明之存乎其人焉測天弧矢說弧矢者割圓之法也割平圓之旁狀若弧矢故謂之弧矢其背曲曰弧背其弦直曰弧弦其中橫曰矢而皆取法乎徑徑也者平圓中心徑也背有曲直弦有修短係於圓之大小圓大則徑長圓小則徑短非徑無以定之故曰取則於徑而其法不出於句股開之之術以矢求弦則以半徑為弦半徑減矢為股股弦各自乘相減餘為實平方開之得句句即半截弦也以弦求矢亦以半徑為弦半弦為句句弦各自乘相減餘為實平方開之得股股半徑減矢之餘也以減半徑即矢或以矢減全徑為句股和以矢為句
