body:
  text: 卽句弦較句股較加句股和半之爲股減句股和半之爲句股較加股弦和半之爲弦減股弦和半之爲句股弦較加句弦和半之爲弦減句弦和半之爲句弦和較加弦和和半之爲和減弦較和半之爲弦弦較較加弦較和半之爲弦減弦較和半之爲較化而裁之存乎變推而行之存乎通神而明之存乎其人焉測天弧矢説弧矢者割圓之法也割平圓之旁狀若弧矢故謂之弧矢其背曲曰弧背其弦直曰弧弦其中横曰矢而皆取法乎徑徑也者平圓中心徑也背有曲直弦有修短係於圓之大小圓大則徑長圓小則徑短非徑無以定之故曰取則於徑而其法不出於句股開之之術以矢求弦則以半徑爲弦半徑減矢爲股股弦各自乘相減餘爲實平方開之得句句卽半截弦也以弦求矢亦以半徑爲弦半弦爲句句弦各自乘相減餘爲實平方開之得股股半徑減矢之餘也以減半徑卽矢或以矢減全徑爲句股和以矢爲句
