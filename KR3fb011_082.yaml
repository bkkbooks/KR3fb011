body:
  text: 一段三分三十六秒九十六微二段三分三十六秒九十六微三段三分三十六秒九十六微四段三分三十六秒九十六微取太陰平定立三差法術以三差三分三六九六倍之得六分七三九二為尖圓巔秒折半一段二差一十四分八三二得七分四一六以尖圓巔秒相減得六十七秒六八以六除三差得五十六秒加尖圓巔秒得一分三二八四再加一段二差一十四分八三二共得一十六分七四又加一段一差一度一七二四九六得一度三十三分三十二秒為實以一段下十二限為法除實得一十一分一十一秒為積度定差推太陰平差法術以倍三差得六分七十三秒九十二微減一段二差一十四分八三二餘八分九三八為實以一段積限一十二限為法除實二次先除一次得六十七秒四四為實再以十二限為法而一得五秒六十二
