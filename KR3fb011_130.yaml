body:
  text: 閏餘再以虧復併折取得中數以定月食分秒而得交泛交泛旣定則曆數罔不合矣曆元假如測元成宗元貞元年乙未歲十月十六日丙辰夜望月食初虧七十五刻一二一一四復圓八十九刻六七九六七二以初虧減復圓餘十刻五五八五三二折半得七刻二七九二六六以率而一得八十八分七七一五三六六以定限行度初度九十一分三四乘之得八度一八三九二一五三四四以六而取一得一十三分五一三九八七自之得一百八十二分六二七八四以減二百二十五分餘四十二分三七二二一六以平方法開之得六分五九三九五以減十五分餘八分四十九秒六爲月食分秒以八十七刻乘月食分秒得七度三八六八二六五減月食定度分加中交度共一百八十七度五五九八三五加縮差初度九十六分三二六四五五共得
