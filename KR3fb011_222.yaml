body:
  text: 度而一減四度四十六分得南北泛差推南北定差以距午分乘南北泛差以半晝分而一減南北泛差不及減者反減之盈初縮末正交為減差中交為加差縮初盈未正交為加差中交為減差如泛差反減者應加作減應減作加推東西泛差食甚入盈行定度不拘初末具減半歲餘以初末限乘之一千八百七十度而一得東西泛差以距午分乘東西泛差以二十五刻而一得東西定差泛差以下就為定差以上倍泛差減之為東西定差盈曆午前縮曆午後正交為減中交為加縮曆午前盈曆午後正交為加中交為減推正交定限度以正交三百五十七度六十四分內加減南北東西定差得正交定限度推中交定限度以中交一百八十八度五分內加減南北東西定差得中交定限度推陰陽曆交前交後度交定度在正交度以下正交定限度內減交定度餘得陽曆交前度交定度在正交度以上交定度內減正交定限度餘得陽曆
