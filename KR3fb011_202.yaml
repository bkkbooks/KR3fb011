body:
  text: 為通閏以二十四氣而一歲周得氣策十五日二一八四八三三三以土木相會之年二十歲乘氣策得三百四日三六九六六六六七為實以通閏為法而一得二十八日為紫氣度率不及二十八月法收之故曰二十八年有十閏月原不及草八年只二十七年便十閏月有奇以紫氣度率二十八日而一一度得三分五十七秒十四微二十九纖為紫氣日行分原不及九纖以紫氣度率二十八日乘周天度分三百六十五度二十五分六十四秒得紫氣周積一萬二百二十七日十七刻九十二分以日法五千二百三十分而一轉終分一十四萬四千一百一十秒六千六十六微得轉終日二十七日五五四六以轉終日而一周天度分三百六十五度五二六四得十三度二五五七三二二五減月平行度十三度三六八七四五八六餘得月孛日行分十一分三一三六一以月孛日行分而一一度得月孛度率八日八四八
