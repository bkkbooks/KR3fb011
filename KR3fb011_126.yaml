body:
  text: 南一北人西視之穿於中封之間所以有差必將差刻于合朔之內減之使其遲見迨月過合朔而方下遮人目上遮日體故曰中後爲減中者指正午而言也此謂時差氣差者卽南北差也何也太陽自秋分出赤道南漸漸而低低至天正日南至最低者其𨇠寬故曰盈初縮末也自春分入赤道北漸漸而高高至天衝日北至最高者其𨇠窄故曰縮初盈末也而日月之道交於秋分及春分在冬至前後者正交減差中交加差皆加減正交中交限度之中也故曰氣差也刻差者卽東西差也何也太陽自冬至距夏至越春分之交者爲盈也夏至距冬至越秋分之交者爲縮也太陽交道交在午前冬至距夏至之日正交爲減中交爲加交在午後正交爲加中交爲減皆加減正交中交限度之中也故曰刻差也氣差卽南北差刻差卽東西差加減限度已定故曰定限度其數有正交定限度比正交交定度如交定度在正交定限度已下者相對減之所謂陰曆交前
