body:
  text: 微爲泛平差折半得平差二秒八十一微卽太陰積度平差推立差術以三差三分三六九六爲實以一段下積限一十二限爲法而一三次得一十九微五十纖爲泛立差以六而取一得三微二十五纖爲立差推太陰損益定差法以平差二秒八十一微加立差三微二十五纖得二秒八十四微二十五纖以減平差一十一分一十一秒餘得損益定差一十一分八秒一五七五推太陰損益平差法術以泛平差五秒六十二微加泛立差一十九微半得五秒八十一微半爲損益平差推太陰損益立差法泛立差一十九微五十纖卽太陰損益立差問太陰四十二限損益若干答曰損益六分九十六秒三二五術以四十二限減一折半得二十五以四十二
