body:
  text: 二秒為泛平差折半得二分二十一秒為積度平差以一段積日一十五日六十二刻為法而一三差三次先除一次再除一次又除一次得一秒六十二微為泛立差以六而取一得二十七微為立差泛平差加泛立差得加分平差四分四三六二以積度平差二分二十一秒加立差二十七微共得二分二十一秒二十七微以減泛平差四刻八十七分六秒餘得加分定差四刻八十四分八四七三以泛立差一秒六十二微就為加分立差推縮初盈末加分以所得縮初盈末日減一日折半以縮初盈末日乘之得數以立差一秒六十二微乘之得數寄位以平差四分四三六二乘縮初盈末日得數併入寄位共得數減定差四刻八十四分八四七三餘得縮初盈末加分推積度法以縮初盈末日乘立差二十七微得數加平差二分二十一秒再以縮初盈末日乘之得數以減定差四
