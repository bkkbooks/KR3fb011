body:
  text: 股之差相減其差曰弦較較股弦相併則曰股弦和句弦相併曰句弦和句股之差併弦則曰弦較和句股弦併曰弦和和句股各自乘相併爲弦實平方開之得弦句弦各自乘相減餘爲股實平方開之得股併弦實減句股各自乘開其餘得句股較弦句股較各自乘倍弦實相減開其餘得句股和併句弦除股實得句弦較句弦之差除股實得句弦和併股弦以除句實得股弦較股之差除句之實得股弦和句股和自乘減弦實弦較較除之得弦較和弦較和除之得弦較較句股之差自乘以減弦實弦和和除之得弦和較弦和較除之得弦和和以句乘股爲實併句股爲法實如法而一句股之容方也以乘股倍之爲實句股求弦倍之爲法實如法而一句股容圓之徑也容圓之徑卽弦和較也若錯綜爲用句加股弦較卽弦較較減股弦較卽弦和較加弦較和卽股弦和股加句弦較卽弦較和減句弦較卽弦和較加弦較較卽句弦和句股較加股弦較卽句弦較股弦和相減卽句弦和句股和加股弦較卽句弦和減股弦和
