body:
  text: 以北極去地四十度九十五分為半弧背以割圓三乘方法取得距地半弧弦三十九度二十六分為三斜中股大三斜以二至黃赤道內外度二十三度九十分以內外半弧弦為大句小三斜以周天半徑六十度八十七分五十秒以句弦求句股法較經得四度八十一分為二至出入矢度以夏至南去地平七十四度二十六分五十秒為半弧背以割圓推得五十八度四十五分為半弧弦以周天半徑十五度八十七分五十秒為大三斜以中股三十九度二十六分乘內外弧弦二十三度七十一分得九百三十度八五四六以周天半徑而一得一十五度三十九分為小三斜中股以三斜中股減日南地平五十八度四十五分餘四十三度一十六分為大股以周天半徑六十度八七五減出入矢度四度八一餘五十六度六分五十秒為大股弦以小股十五度二十九分乘大股弦得八百五十七
