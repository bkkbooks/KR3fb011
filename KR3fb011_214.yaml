body:
  text: 附曆元布算法推中積以積年乘歲實得中積推天正冬至以中積加氣應以紀法六十日去之得天正冬至分大餘以甲子算外得日辰小餘以發斂收之五十刻以下為正刻逢五十刻進一時為初刻得時刻推次氣纍加氣策亦以甲子算外以發斂收之得次氣日辰刻上推者中積內減氣應滿紀法去之六十內減之推閏餘以中積加閏應以月策除之不滿月策者得其年閏餘上推者中積內減閏應以月策除之不及月策月策內減之推經朔以冬至減閏餘得天正經朔求次朔纍加月策求弦纍加弦策推遲疾曆以中積加轉應減其年閏餘以轉終去之不滿轉終得其年天正入朔疾曆轉中以上減去轉中得遲曆求次月纍加月策減轉終疾則為疾遲則為遲轉中以上減去轉中疾變為遲遲變為疾如是上推以中積加其年閏餘減轉應以轉終
  hash: sha256:4ef5acd354df897abcdeb8d03ef69112b05fe7fbabdc214235007368cd92cfd5
