body:
  text: 二五以赤道五十六度七九五一而一得二十五度五一七一為赤道半弦以半徑乘赤道小股五十一度五六四七得三千一百三十九度以赤道小弦五十六度七九五一而一得五十五度二六八八為赤道大句以半徑六十度八十七分五十秒內減赤道大句餘五度六十分六十二秒為赤道矢以赤道矢自之得三十一度四二九四七八四四以周天徑而一得二十五分八十一秒為赤道背弦差加赤道半弧弦得二十五度七十七分五十二秒為赤道積度推晝夜刻元北京順天府即元大都北極出地四十度九十五分測到二至黃道距赤道內外度二十三度九十分測到二至黃道距赤道內外半弧弦二十三度七十一分為黃道平距赤道半弦二至出入差股一十五度二十九分為中股
