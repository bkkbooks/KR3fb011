body:
  text: 加三差六秒二四二二得九秒三六三三以減一段二差三十九秒一六二一餘二十九秒七九八八為實一段積度十一度五十分為法而一得二秒五九一二是木星平差以三差六秒二四二二折取其中為實以一段積度為法而一二次先除一次得二十七微一四為實再以一段積度為法而一得二微三六是木星立差火星元平立定三差法盈初縮末一百十四日七二段目積日積度一段一十四日三十四刻七度六十二分五十秒二段二十八日六十八刻十五度二十五分三段四十三日二刻二十二度八十七分五十秒四段五十七日六十六刻三十度五十分五段七十一日七十刻三十八度十二分五十秒六段八十六日四刻四十五度七十五分七段一百日三十八刻五十三度三十七分五十秒八段一百十四日七十二刻六十一度
