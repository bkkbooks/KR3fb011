body:
  text: 擬奏考定曆元疏稿直隸保定府滿城縣儒學生員臣魏文魁謹奏為恭進曆元考測真數仰佐欽若至心伏乞聖明俯賜睿裁以成皇朝巨典事臣竊惟撫辰齊政治曆明時聖帝明王之先務也我太祖高皇帝驅逐胡元成祖文皇帝蕩掃沙漠再闢乾坤重輝日月於是萬法更始庶政聿新惟兹曆象之官當時旁求未獲以故曆名大統數仍授時蓋將以有待也謹按授時曆法雖頗詳密至於分秒竒零未免失之絫况今更歷三百餘載積漸推移頗多舛錯竊見邇年閏餘乖次氣朔愆期甚至交食不效有推算在先而測驗在後有推算在後而測驗又在先有應食不食不應食而食諸如此類
  hash: sha256:5871d575b9b8ca46f9f9089d43ce3297893cce77521f3ebaa44407437d1cc506
