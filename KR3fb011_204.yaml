body:
  text: 四九二以月孛度率乘周天度分三百六十五日二十五分六十四秒得月孛周積三千二百三十一日九十六刻八十四分以日法而一交終分十四萬二千三百十九秒九三六八得交終日二十七日二一二二二五以交終日而一周天度分得十三日四二二五一一三九以減月平行度餘得羅計日行分五分三七六五五三大明曆失四十九纖以羅計行分而一一度得羅計度率十八日五十九刻九十二分七七二六大明曆差算一分六十九秒半所用者羅計度率十八日五十九刻九十一分七七六日行分五分三十七秒六六二以度率乘周天分得羅計周積六千七百九十三日四四三二以折半羅計周積爲半周積三千三百九十六日七十二刻一六授時曆至元十七年庚辰歲四應四餘法元歲周三百六十五日二十四刻二十五分周天周度分三百六十五度二十五分七十五秒
