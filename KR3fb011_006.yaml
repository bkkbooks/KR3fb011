body:
  text: 明唐主僧一行法屢遷曆亦屢變宋儒守墨難與譚天郭守敬授時曆實剙羯胡閏位之日冲之遺法稍稍著見定歲成日審時分刻之數亦稍稍周晰足稱完書苐體要雖挈紛緒未剖竒零秒忽略焉弗精繇今溯元載幾四百日月交食間有愆忒罔恊者有識胥爲皇朝未備鉅曲致惋余以已未薄游燕市得律曆考全帙讀之當吾世尙有覃思象緯者輒爲色
