body:
  text: 明唐主僧一行法屢遷曆亦屢變宋儒守墨難與談天郭守敬授時曆實創羯胡閏位之日沖之遺法稍稍著見定歲成日審時分刻之數亦稍稍周晰足稱完書苐體要雖挈紛緒未剖竒零秒忽略焉弗精繇今溯元載幾四百日月交食間有愆忒罔協者有識胥為皇朝未備巨曲致惋余以已未薄遊燕市得律曆考全帙讀之當吾世尚有覃思象緯者輒為色
