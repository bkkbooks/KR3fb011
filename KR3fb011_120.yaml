body:
  text: 以每日晨前夜半盈縮曆即黃道積如滿歲周象限九十一度三一六巳下為初巳上用減半歲周一百八十二日六十二分一十二秒為末限以滿度率去之餘以內外差乘之得數減內外度為去極度分冬至晝刻夏至夜刻三十八刻一十六分夏至晝刻冬至夜刻六十一刻八十四分晝夜百刻昏明二十五刻日晝夜刻者以黃赤道半弧弦以二至出入半弧自乘之以二至出入內外半弧弦而一為出入差半背又法以度差八十四分一十九秒乘得出入差半背以周天經內減內外二矢赤道小弦差餘三因之每日行度為日行百刻度分以出入半弧背以百刻乘之以日行百刻而一得出入差刻以昏明二十五刻黃道在赤道內加之外減之皆加減出入差得半晝刻倍之得晝以減百刻餘為夜問冬至後四十四日晝夜各若干刻
