body:
  text: 喜越七年領郡上谷迫欲因書識其人則邢觀察往矣客有言魏生者延置郡閣抵掌纍日玄象進退往復之故暨曆象考測諸法繇唐虞迄勝國靡不鉤索深隱洞究合離因出曆測一編細為簡閲浮采芟滌數法賅存譬衡設而輕重在懸足闡沖之未竟之業令守敬瞪乎後者不意千古曆法至今克明真熙代盛事也魏生志僻服野髮種種須杖始行獨於今古未明一
