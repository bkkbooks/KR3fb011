body:
  text: 末加分推積度法以盈初縮末日乘立差三十一微得數加平差二分四十六秒再以盈初縮末日乘之得數減定差五刻一十三分三十二秒餘以盈初縮未日乘之得盈初縮末積度分推盈縮差盈縮初末日刻分秒去其日留刻分秒以加分乘之得數加積度分內得盈縮差又術以盈縮初末日刻分秒乘立差得數加平差再以盈縮初末日刻分秒乘之得數減定差餘以盈縮初末日刻分秒乘之得盈縮差推縮初盈末平立定三差法以太陽日躔夏至測至秋分後二日四十刻奇共計九十二日七十二刻晝夜相停曰盈初以夏至上距春分前九十二日七十二刻亦差二日四十刻奇曰盈末以縮初盈末九十二日七十二刻分為六段六段者何也夏至小暑大暑立秋處暑白露距秋分後
