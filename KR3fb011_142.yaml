body:
  text: 一百一十五算萬曆二十四年丙申歲八月乙丑朔日食八分強弱之間初虧巳初刻曆官報食九分八十六秒初虧已末三十三算天啟元年辛酉歲四月壬申朔日食曆官報三分九十一秒初虧申正三刻測候日食四分有奇初虧酉初一刻八年算古今月食有時刻更點者並皆距崇禎二年已巳歲算之劉宋元嘉十一年甲戌歲七月丙子望月食四更二唱初虧四更四唱食旣一千一百九十五算十三年丙子歲十二月已已望月食一更三唱食旣一千一百九十二算十四年丁丑歲十一月癸亥望月食二更四唱初虧三更一唱
