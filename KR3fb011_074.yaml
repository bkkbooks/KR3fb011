body:
  text: 刻八十七分六秒餘以縮初盈末乘之得縮初盈末積度分問太陽冬至後四十四日加分若干答曰二分七十五秒九六二九術以冬至後四十四日減一日剩四十三日折半得二十一日五十刻為實以四十四日為法乘實得九百四十六以立差一秒八十六微乘之得一十七分五九五六寄位另以平差四分九十三秒八十六微為實以四十四日乘之得二刻一十七分二九八四併入寄位內得二刻三十四分八九四以減定差五刻一八五六九餘得二刻七十五分九六二九以日為度刻即分也合問問太陽冬至後四十四日積度若干答曰一度七十五分五十九秒四四九六術以冬至後四十四日乘立差三十一微得一十三秒六十四微加平差二分四十六秒得二分五十九秒六十四微再以四十四日乘之得一刻一十四分二四一六以減定差五刻一十三分三十
