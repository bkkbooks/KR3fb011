body:
  text: 謂之交終交者日月行道兩交之會也日道月道兩環相交穿心十字一首一尾日差雖微月差不少所以交終交中之度逆而西流乃有東西南北之衝翔望終中之輳輪轂擊摩矢的注射則交食緣是以生迎日推策託始於此堯典日短星昴其𨇠在虛更數千載歷女牛斗今乃在箕中星遞變而四時不忒日為歲籥之君也故日月之會謂辰辰紀十二而十二未足成歲此閏月之置以正時也曆者數也數生於象故閉室而候葭灰之應律不如正晝望表之端詳也懸衡而程土炭之中權不如淸夜察漏之審密也瞻運行於縣象則三辰之軌則齊矣差盈縮於陰陽則二氣之均節調矣按四餘之時位能使烏兔異馳而不愆步五緯之性情能使逆順殊程而莫爽是故限之而知多寡之劑積之而知初末之勢應之而知往復之致較之而知密微之際窺覘晷景推演算術倍半相權乘除互倚引伸觸類巧歷之能事畢矣自羲和失職土圭曠廢獨杜元凱驗天求合之說千古名通歷覽前史劉宋祖沖之創法到今無弊胡元郭
