body:
  text: 以十二月策較歲周得通閏以二十四而一歲周得氣策五星以前合距後合得周日以躔宿度距星𨇠復至宿度一周天度分之日得曆率以周天度分而一曆率得度率以夕留日刻分距晨留日刻分折取其中得合伏日以五星盈縮差加減之得合應以五星出黃道最遠得曆應以木火土三星周日較周日得前合至後合中星度一率入曆度一率木火土三星各得周日中星度入曆度也金水一日一度周日同周度也以木土二星二十年之會乘氣策以通閏而一得紫氣度率以度率而一一度得紫氣日行分以轉終而一周天度分得轉平行分以月平行度較之得月孛日行分以月孛日行分而一一度得月孛度率以月孛度率乘周天度分得月孛周積以交終而一周天度分得交平行度分以交平行度分較月平行度得羅計日行分以羅計日行分而一一度得羅計度率以羅計度率乘周天度分得羅計周積以歲周較周天度分得歲差以歲差而一一度得差度之年以四除月策得弦策倍弦策得望策以三因弦
