body:
  text: 十二分九一四四為實再以一十四日八十二刻為法除實得四分九十二秒為泛平差折半得二分四十六秒為積度平差以三差六十分五四二一一一為實以一段積日一十四日八十二刻為法除三次得一秒八十六微為泛立差以六而取一得三十一微為積度立差以積度平差二分四十六秒加積度立差三十一微得二分四十六秒三十一微以減積度定差五刻一十三分三十二秒餘五刻一八五六九為加分定差以泛平差四分九十二秒加泛立差一秒八十六微得四分九二八六為加分平差以泛立差一秒八十六微就為加分立差推加分法以所得盈初縮末日減一日折半以盈初縮末乘之得數以立差一秒八十六微乘之得數寄位以平差四分九三八六乘盈初縮末日得數並入寄位共得數減定差五刻一八五六九餘得盈初縮
