body:
  text: 余髫歲受帖括家言竊私心厭苦强朿墩師弗善也間從篋中獲黃帝吱伯暨甘石管郭諸家書稍稍嗜之雖未䆒厥本原嗜生習習成惟獨咀味不歚棄去人多以癖見哂皍余亦自哂終不解癖嗜何故也偶遘魏太乙氏于上谷得曆測讀之徵往察來探數立法言有故理有極其於天道鑿鑿乎如規矩之肖方圓權度之制輕重真有不出戶而灼知者填臆疑團恍惚發覆余因自笑所嗜之尚未成癖若太乙氏乃堪以癖名家者耳書凡二萬五千餘頁較勘十日始付殺靑時則歲之已已律中林鍾斗指午後之三日也歙方萬順仲裕父識
  hash: sha256:2791ea93c3077e14b795970bb6e4b017c34d1f9e40f0b5ba8b9ad5716b351737
