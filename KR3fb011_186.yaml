body:
  text: 周天度分三百六十五度二十五分六十四秒月策二十九日五三五六六轉終二十七日五五四六九二九交終二十七日二一二二二五氣應五十五日二十五刻閏應二十日三七六二轉應十三日七九二交應二十六日二十一刻問四餘至後策者何謂也答曰至後策者冬至之後也閏餘朔距冬至也閏餘日即南至日也至去朔故曰閏餘以氣日刻數較閏餘之餘數是在至後之零數故曰至後度率者幾日行一度也以度率乘至後之零數得其數故曰至後策四餘元四餘不正者元人不識四餘之元也然以授時曆四應取四餘至後策而又與今大統曆四餘抵牾不合者至元辛巳歲四餘法細録於後
