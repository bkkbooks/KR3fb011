body:
  text: 限乘之得二百六十一以立差一十九微五十纖乘之得一分六七八九五寄位另置五秒八十一微五十纖以四十二限乘之得二分四四二三加入寄位得四分一十二秒一十二微半減一十一分八秒一五七五餘六分九十六秒三二五合問問太陰四十二限下積度若干答曰積度三度九十二分九十七秒三十微術以立差三秒二十五微以四十二限乘之得一分三六五加平差二分八十一秒得四分一七五再以四十二限乘之得一分八十六秒三十五微減定差一十一分一十一秒餘九分三五六五又以四十二限乘之得三度九十二分九十七秒三十微合問測天句股説句股之法橫曰句直曰股斜為弦句股相減其差曰較句股相併曰合股弦之差曰股弦較句弦之差曰句弦較併句股與弦相減之差則曰弦和較弦與句
