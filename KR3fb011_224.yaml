body:
  text: 交後度交定度在中交度以下中交定限度內減交定度餘得陰曆交前度交定度在中交度以上交定度內減中交定限度餘得陰曆交後度推日食分秒以陰曆八度陽曆六度內減交前交後度分餘以陰八十刻陽六十刻而一得日食分秒推定用分以二十分內減日食分秒餘以日食分乘之得平方積以平方法開之得平方數以五千七十四乘之以定限行度而一得定用分推初虧復圓分食甚分減定用分爲初虧分以食甚分加定用得復圓分以發斂收之得時刻推日食虧復方位陽起西南甚正南復圓東南陰起西北甚正北復圓東北推日帶食如日食在晨刻者以日出分減日食分餘得帶食差以日食分乘之以定限行度而一得帶食分以減日食分餘得見食分如食在昏刻者以日入分減食甚分餘得帶食差以日食分乘之以定用分而一得帶食分以減日食分餘得不見食分
