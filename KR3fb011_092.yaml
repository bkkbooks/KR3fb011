body:
  text: 股較乘之亦得句畀即半截畀也矢自乘圓除之得半背弦差倍以加弦即弦背以半背弦差除矢畀亦得圓徑半截弦自乘為實以矢除之得矢徑差加矢即圓徑以矢加弦以矢乘而平方開之即所截之積也倍截積以矢除之減矢即弦倍截積以弦為從方開之即矢惟弧背與徑求矢截積與徑求矢開不能盡用三乘方法開之弧背求矢以半弧背畀與徑畀相乘為實徑乘徑畀為從方徑畀為上廉全背與徑乘餘為下廉約矢乘上廉以減從方以矢自乘以減下廉以矢自乘下廉與減餘方方為除實得矢何為以矢乘上廉減從方也蓋從方乃徑與徑畀相乘其中多一矢乘徑畀之數八減之何為又以矢自乘以減下廉也下廉乃背徑相乘其中多一矢自乘之數故以減之則法與實相合矣以截積求矢則倍積自乘為實四因積為上廉四因徑為下廉五為負隅約矢以隅因之以減下廉又以矢一度乘上廉兩度乘下廉併而為法矢減下廉者何也矢本減徑而得故減徑以求之五為負隅者何也凡以方為圓每一寸
