body:
  text: 以先初啇四乘上廉得五萬九千二百九十二度二十五分以減益從方餘一百七十四萬五千四百一十五度六九三七五為從方以初啇四度自之得十六度以減下廉餘五千八百二十八度以初啇四度乘之得二萬三千三百一十二度為從廉併從方得一百七十六萬八千七百二十七度六九三七五為法除實餘實一百四十六萬三千一百七十三度五十六分二十六秒以初啇四度倍之得八度加八十分得八度八十分乘上廉得十三萬四百四十二度九十五分以減益從方餘一百六十七萬四千二百六十四度九九三七五為從方以四度八十分自之得二十三度四又加初啇四度自之之數得三十九度四分以減下廉餘五千八百四度九十六分以八度八十分乘之得五萬一千八十三度六四八為從廉以併從方得一百七十二萬五千三百四十八度五五七三七五為法除餘實餘實八萬二千八百九十四度七一六六以次再啇四分加初次倍數得九度六十四分乘上
