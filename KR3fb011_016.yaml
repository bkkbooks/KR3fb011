body:
  text: 未易枚舉天象如彼曆法如此兩不相符有目共見識者以爲必從脩改乃合天道第運氣深徵數法淵邃非值神聖御極玄化生心鮮克上律天時脩明曆數臣草茅布衣跧伏山野不于世務每守先臣世傳良法時常測候積有歲年輙得其理以數推算罔不脗合懷抱日久欲請更正魯於天啓六年撰成書冊擬伏闕上奏適會奸閹亂政朝廷多事臣之愚意竊以曆數大命不得妄畀匪人若明珠暗投恐資奸雄攘竊用是卷懷退䖏靜待淸時重念曆法久淆天道無紀必有上聖應期維新景命恭遇皇上乘龍御天超邁萬古乃元年正月元日立春五始同會於一元自上世所未有也兹寔皇天誕開至聖正始受命之符愚臣是以忘其狂瞽敬陳一得上凟
