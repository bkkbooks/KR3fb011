body:
  text: 太陽日躔平定立三差元以太陽日躔冬至測至春分前差二日四十刻奇共計八十八日九十二刻晝夜相停曰盈初以冬至上距秋分後八十八日九十二刻亦差二日四十刻奇曰縮末以盈初縮末八十八日九十二刻分爲六段六段者何也冬至小寒大寒立春雨水驚蟄距春分前六氣也秋分後寒露霜降立冬小雪大雪距冬至六氣也各差二日四十刻奇將八十八日九十二刻分爲六段每一段該十四日八十二刻就倍之得第二段積日以三因第一段積日十四日八十二刻得三段積日四因得四段五因得五段六因得六段積日開後一段十四日八十二刻二段二十九日六十四刻三段四十四日四十六刻四段五十九日二十八刻五段七十四日一十刻六段八十八日九十二刻段目積差一段七十二刻五七一六二四五二段一日三十九刻七二八九九七一
