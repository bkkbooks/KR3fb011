body:
  text: 上減半歲為末限求遲疾限以一十二限二十乘遲疾曆初至八十三限為初限以上為末限求遲疾日率以遲疾初末限乘八刻二十分八秒日下止留四位為遲疾日率求遲疾差以遲疾曆限乘立差三百二十五分加平差二萬八千一百又以遲疾曆限乘之以減定差一千一百一十一分又以遲疾限乘之得遲疾差求遲疾行度以遲疾限減一折半仍以遲疾限乘之又乘一十九微半得數寄位又以原限乘五秒八十一微半併寄位兩相並得數加一度二七一為疾行度減度九八五五為遲行度求加減差盈差遲差相併縮疾差相併盈疾差相減縮遲差相減具以八刻二十分乘之以遲疾行度而一得加減差盈遲為加差縮疾為減差求定朔弦望以加減差加減經朔弦望得定朔弦望大餘以甲子算外得日辰小餘以發斂收之得時刻
