body:
  text: 月策二十九日五三五九三轉終二十七日五五四六交終二十七日二一二二二四術以劉宋大明壬寅歲距元世祖至元辛巳歲八百一十九算以大明壬寅氣應接至元辛已歲氣應得歲周見於先不復録以周天度分三百六十五度四分度之一倍之得七百三十度五十分內減歲周三百六十五日二十四刻二十五分得三百六十五度二十五分七十五秒為周天度分以月策而一周天度分得數加日行一度共得十三度三六八七八三一一為月平行度大統所用月平行度乃金大明曆月平行度以轉終而一周天度分得十三度二五五七七二一七減月平行度餘得月孛日行分十一分三一九四以月孛日行分而一一度得月孛度率八日八十四刻七八
