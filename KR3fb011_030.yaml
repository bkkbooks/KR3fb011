body:
  text: 守敬規模沖之遂出諸家之上第其中分秒奇零當年未竟厥算歷年既多宜加考測余家世星歷測候有年兼習隸首算數以法推得曆元諸應上遡沖之千百餘載劵若合符悉皆原本圜象為起數宗記曰為朝夕者必放於日月斯事雖極幽玄實乃有目共見第愧魁伏處巖野偶於此事稍有一得恨未能躬叩闕下獲覩皇祖時所製圭漏隨司天諸臣後詳一測驗完兹當代缺典俾不墜先世緒業是魁所菀積而未敢自寧者也謹以考定諸法略載左方俟治曆明時君子釆焉定曆元法天行運數日薄星回參差互異分秒極微雖絫黍析塵未足相擬也惟恃測驗以求其端璣衡土圭自古而用之周禮日至之景尺有五寸鄭衆以為表高八尺元郭守敬考定授時曆法乃五倍其表余以表不在高下圭不在長短惟取表端圭正晷景自然合法
