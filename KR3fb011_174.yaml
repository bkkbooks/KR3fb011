body:
  text: 減三差之半四秒三七七四七五餘十七秒三九四九為實以一段積度十一度五十分為法而一得一秒五一二六為縮曆初末平差以三差折取其中得四秒三七七四七五為實以一段積度十一度五十分為法而一二次先除一次得三十八微六五再除一次得三微三十一纖為土星縮曆初末立差金星盈縮平定立三差法元段目積日積差一段一十一日五十刻度四二一三四九八七五二段二十三日度七九一三九三六六三段三十四日五十刻一度一五四九一二八一二五四段四十六日一度四七九八二二七六五段五十七日五十刻一度七五三二五九九三七五六段六十九日一度九六二三五四四八七段八十日五十刻二度九四二四二三一六二五八段九十二日二度一三六五六以段日而一積差前後相較得一差一差相較得
