body:
  text: 也方圓之理天地也方象法地靜而質實故可以器數求之圓象法天動而體虛故可以設法測而推之陰陽交錯萬物化生其機妙於奇零不齊之處上聖能在而齊之則毫髮悉見也夫天地之道具可以測量得也雖化機無盡要不能逃掌握中矣黃赤道弧矢法天之高也至於測驗皆實理也以璿璣玊衡測星度不若以圭表漏刻測黃赤道星度尤準古人止於璿璣玉衡有分無秒若以圭表漏刻測之不爽毫芒余驗之久矣至於測氣測轉測交食時刻分秒罔有遁情加以句股弧矢割圓尖圓盈朒之術宛轉獻形矣天地之始可探也天地之終亦可探也重黎羲和尚矣漢曆起於張倉而劉歆三統李𣑽四分姚秦薑岌三紀劉宋何承天元嘉祖沖之大明北齊張子信五星劉焯皇極唐傅仁均戊寅李淳風麟德僧一行大衍徐昂宣明姚舜輔紀元元郭守敬授時大率粗疏得其綜者惟祖沖之郭守敬雖然未盡善也自元至元辛已歲至今崇禎戊辰歲三百四十八年未有善
