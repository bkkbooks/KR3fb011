body:
  text: 次又次餘實餘四百四十八萬五千三百三十四度七六三四八一六為四餘實以初次再次又次四次啇四度八四八倍之加二秒得九度六十九分六十二秒以乘上廉得一十四萬三千七百二十七度三七八六一二五以減益從方餘一百六十六萬九百八十度八七六二五為從方以五次啇四度八四八二自之得二十三度五五四三二四加初次四啇自之之數得四十七度八一四七二四以減下廉餘五千七百九十六度九九一八五二七六是為廉身以乘九度六十九分六十二秒得五萬六千二百八度七九二四二七三一五一二為從廉併從方得一百七十一萬七千一百八十九度二七三一六五二三一五一二為法除四次餘實餘一百五度九五五五不用棄之問半弧背二十四度黃赤道積若干答曰二十五度七十七分五十二秒法以周天半徑六十度八十七分五十秒內減矢
