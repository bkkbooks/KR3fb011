body:
  text: 段目一差一段五十九刻一八二三二四一四二段四十七刻一六三四三四一六三三段三十四刻五二七一六二九四段二十一刻二七三四九八八五段七刻四二四四八一二已上以一段一差減二段一差得一段二差二段一差減三段一差得二段二差以三段二差減四段一差得三段二差以四段一差減五段一差得四段二差以二差較二差得三差此尖圓一周段目二差三差一段一十二刻一八八八六二五一六十一分七三八七八八三二段十二刻六三六二七四二三四六十一分七三八七八八五三段十三刻二五三六六二二一六十一分七三八七八八七四段十三刻八七一四九九六已上以一段二差減二段二差得三差以二段二差減三段二差得三差以三段二差減四段二差得三差此尖圓之巔秒故推法用三乘得盈縮之差也
