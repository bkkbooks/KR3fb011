body:
  text: 積日大明五年氣應減積日以積年而一得歲周其他仍舊歲周三百六十五日二十四刻二十五分月策二十九日五十三刻五分九十三秒仍舊轉終二十七日五十五刻四十六分交終二十七日二十一刻二十二分二十四秒周天度分三百六十五度二十五分七十五秒月平行度一十三度三十六分八十七秒半據郭太史自言至元辛已歲距大明壬寅歲八百十九年積四千九百八十五甲子以六十日因之得二十九萬九千一百日加至元辛已氣應五十五日六刻減大明壬寅歲氣應二十一日三十二刻得二十九萬九千一百三十三日七十四為實以積年八百一十九為法而一得三百六十五日二十四刻二十六分有奇為歲周今按授時所用歲周三百六十五日二十四刻二十五分乃是金重修大明曆所步非宋祖沖之大明曆也然以至元辛已距大明壬寅八百一十九年積四千九百八十五甲子以六十因
