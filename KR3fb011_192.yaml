body:
  text: 三餘二十日七七一九以月平行度十三度三六八七五乘之得二百七十七度六九四三三八一二五加入朔加時行定度一百六十一度八五四一一四及冬至加時日躔赤道箕宿十度共得四百四十九度五四八四五二再加半歲周共得六百三十二度一六九七二以減周天度分餘二百六十六度九一二二二以度率八日八四八四九二乘之得二千三百七十一日七八四八四一為月孛至後策羅㬋計都至後策元術以交終二十七日二一二二二四以減交應二十六日一八七八餘一日一九三四四四加閏餘二十日一八五得二十一日三七八四四四以月平行度乘之得二百八十五度八三七三二二五加入朔加時行定度及加冬至加時日躔赤道箕宿十度共得四百五十七度六五七一八七二二五再加半歲周一百八十二日六二一二五共得六百四十日二七八四三七去周天度分餘二百七十五度三四三七以減周天度分餘九十度二五
