body:
  text: 七分五十秒而一得十七度二五六九為黃赤道小弦又為立句又云橫弦以黃赤道小弦矢二度五十一分八十一秒自之得六度三四八二七六一以周天半徑減赤道小弦為赤道二弦差又為赤道矢以周天半徑減黃赤道矢餘為黃赤道弦又立股又句以二至內外半弧弦乘之以周天半經而一得黃道小弦即黃道內外半弧弦又黃道小句以赤道小弧矢自之以周天經而一得半背弦差以加黃赤道半背弧弦得黃赤道內外半背以黃赤道小弧矢自之得六度三四八七六一為實以周天徑一百二十一度七十五分而一得五分二十秒為半背弦差加入小弧弦得十七度三十分八十九秒為內外黃赤道半背以周天象限九十一度三一四三如是盈初縮末加縮初盈末減皆加黃赤道內外度今冬至後四十四日乃盈初應加十七度三十分八十九秒得一百八度六十二分三十二秒為四十四日太陽去極度
