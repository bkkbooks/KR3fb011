body:
  text: 十七秒是測得大明壬寅歲天正冬至其二十三日以壬戌算外得乙酉日夜半後三十六刻六十三分七十七秒天正冬至史載乙酉日三十二刻冬至誤史載元世祖至元十四年丁丑歲十一月十四日已亥景長七丈九尺四寸八分五釐五毫至二十一日丙午景長七丈九尺五寸四分一釐二十二日丁未景長七丈九尺四寸五分五釐以已亥景較丁未景餘三分五毫為實以丙午景較丁未景餘八分六釐為法除實得三十五刻為刻差以已亥日距丁未日八日以減刻差餘七日六十五刻折取其中得三日八十二刻五十分冬至測到庚辰歲已未日夜半後六刻冬至為十八年辛已歲天正冬至定為曆元元世祖至元十八年辛已歲氣應五十五日六刻閏應二十日十八刻五十分轉應十三日十九刻四分交應二十六日一刻八十七分八十六秒星應赤道箕宿十度
