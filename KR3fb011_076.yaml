body:
  text: 二秒餘三刻九九七八四又以四十四日乘之得一度七十五分五十九秒四四九六合問大統曆立成度即日日即萬刻即百百即分冬至後四十四日積度一萬七千五百五十九分四四九六加分二百七十五分九六二九即此意也問夏至後四十六日加分幾何答曰二分六十四秒一五一術以四十六日減一日折半得二十二日五十刻以四十六日乘之得一千三十五以立差一秒六二乘之得一十六分七六七寄位另以平差四分四三六二乘四十六日得二刻四六五二併入寄位內共得二刻二八三二二以減定差四刻八十四分八四七三餘得二刻六四一五一合問日即度刻即分分即百問夏至後四十六日積度若干答曰一度七十四分六十五秒五九二八術以夏至後四十六日乘立差二十七微得一十
