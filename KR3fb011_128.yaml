body:
  text: 度也如交定度多正交定限度少減餘得陽曆交後度也交定度在中交定限度已下者相對減之所得陽曆交前度也如交定度多中交定限度少減餘得陰曆交後度月食無時氣刻三差者何也月對日則食是謂兩輪相望也故曰望如望於當交道之中而兩輪相對月在人之面前日在人之背後人居中央以背後之日衝面前之月正南東西皆然以人身影日體而面對月光毫釐不錯故月食無差也月離於天東行日𨇠於地西行也至於交道之間日衝月光月光散之周圍體魄相衝日在地下北道西行月在天上南路東走體魄相射如人照鏡在左則右在右則左所以月食陰曆虧起東南食甚正南復光西南也陽曆虧起東北食甚正北復光西北也如月食八分已上虧起正東復光正西也日食有正交中交月食止有中交度也故法定交食之元止用月食之術雖有日食之法不取也以月食虧復併而折之就為定望以盈遲作差減之縮疾作差加之而得經望以較中氣而得
